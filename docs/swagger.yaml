basePath: /
definitions:
  handler.BatchCreateRequest:
    properties:
      notifications:
        items:
          $ref: '#/definitions/handler.CreateRequest'
        maxItems: 1000
        type: array
    required:
    - notifications
    type: object
  handler.CreateRequest:
    properties:
      channel:
        type: string
      content:
        type: string
      priority:
        type: string
      recipient:
        type: string
    required:
    - channel
    - content
    - priority
    - recipient
    type: object
  handler.CreateResponse:
    properties:
      messageId:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  notification.Channel:
    enum:
    - sms
    - email
    - push
    type: string
    x-enum-varnames:
    - ChannelSMS
    - ChannelEmail
    - ChannelPush
  notification.Notification:
    properties:
      batchID:
        type: string
      channel:
        $ref: '#/definitions/notification.Channel'
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      priority:
        $ref: '#/definitions/notification.Priority'
      recipient:
        type: string
      status:
        $ref: '#/definitions/notification.Status'
      updatedAt:
        type: string
    type: object
  notification.Priority:
    enum:
    - high
    - normal
    - low
    type: string
    x-enum-varnames:
    - PriorityHigh
    - PriorityNormal
    - PriorityLow
  notification.Status:
    enum:
    - pending
    - processing
    - sent
    - failed
    - canceled
    - retry
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusProcessing
    - StatusSent
    - StatusFailed
    - StatusCanceled
    - StatusRetry
host: localhost:8080
info:
  contact: {}
  description: This is a scalable server for a notification system.
  title: Notification System API
  version: "1.0"
paths:
  /api/v1/health:
    get:
      description: Check the health of the application and its dependencies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health Check
      tags:
      - health
  /api/v1/notifications:
    get:
      description: Retrieve a list of notifications with filtering and pagination.
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by channel
        in: query
        name: channel
        type: string
      - description: Filter by start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Filter by end date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/notification.Notification'
            type: array
      summary: List notifications
      tags:
      - notifications
    post:
      consumes:
      - application/json
      description: Create a single notification and queue it for processing.
      parameters:
      - description: Notification details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handler.CreateResponse'
      summary: Create a notification
      tags:
      - notifications
  /api/v1/notifications/{id}:
    get:
      description: Retrieve notification details by ID.
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/notification.Notification'
      summary: Get a notification
      tags:
      - notifications
  /api/v1/notifications/{id}/cancel:
    put:
      description: Cancel a pending notification.
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cancel a notification
      tags:
      - notifications
  /api/v1/notifications/batch:
    post:
      consumes:
      - application/json
      description: Create multiple notifications under a single auto-generated batch
        ID and queue them for processing.
      parameters:
      - description: Batch notification details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.BatchCreateRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            items:
              $ref: '#/definitions/handler.CreateResponse'
            type: array
      summary: Create a batch of notifications
      tags:
      - notifications
swagger: "2.0"
